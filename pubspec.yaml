name: present_evidence
description: A Flutter app for lawyers to present evidence with team collaboration and WebRTC remote presentation.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase - auth + database
  supabase_flutter: ^2.5.0

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Apple Sign-In
  sign_in_with_apple: ^6.1.0

  # Google Cloud Storage
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  http: ^1.2.1

  # Navigation
  go_router: ^14.2.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Video player
  video_player: ^2.8.6
  chewie: ^1.8.3

  # PDF viewer
  pdfx: ^2.6.0

  # Image viewer / zoom
  photo_view: ^0.15.0

  # File picking
  file_picker: ^8.0.3

  # WebRTC
  flutter_webrtc: ^0.11.1

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  path: ^1.9.0
  mime: ^1.0.5
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  gap: ^3.0.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
